server {
    listen 443 ssl;
    server_name backend.2brain.uno;

    ssl_certificate     /etc/letsencrypt/live/backend.2brain.uno/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.2brain.uno/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # WebSocket (агент + браузерный терминал)
    location /runtime {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Обычный REST/пейринг
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}